<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Player Chess Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            background: radial-gradient(circle at top, #32524a 0%, #173029 48%, #0f201c 100%);
            color: #f6ebda;
        }
        h1 {
            margin-top: 28px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 72px);
            grid-template-rows: repeat(8, 72px);
            margin-top: 24px;
            border: 14px solid #4b3224;
            border-radius: 12px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35), inset 0 0 0 2px rgba(255, 242, 223, 0.12);
            overflow: hidden;
        }
        .cell {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 120ms ease, filter 120ms ease;
        }
        .cell:hover {
            filter: brightness(1.05);
        }
        .white { background: linear-gradient(145deg, #f2dfbf 0%, #dbc19a 100%); }
        .black { background: linear-gradient(145deg, #8e6548 0%, #68462f 100%); }
        .selected { outline: 3px solid #4ec4ff; outline-offset: -3px; }
        .piece {
            font-size: 46px;
            line-height: 1;
            user-select: none;
            transform: translateY(-1px);
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.35));
        }
        .piece-white {
            color: #fff7eb;
            text-shadow: 0 1px 0 #ffffff, 0 0 8px rgba(255, 248, 230, 0.45), 0 2px 0 #ccb998, 0 3px 5px rgba(72, 47, 28, 0.35);
        }
        .piece-black {
            color: #1a1613;
            text-shadow: 0 1px 0 rgba(255, 236, 213, 0.18), 0 0 6px rgba(0, 0, 0, 0.28), 0 3px 5px rgba(0, 0, 0, 0.45);
        }
        .piece::after {
            content: '';
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0) 70%);
            pointer-events: none;
        }
        #status {
            margin-top: 14px;
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 20px;
            background: rgba(255, 248, 233, 0.12);
            box-shadow: inset 0 0 0 1px rgba(255, 245, 228, 0.14);
        }
        .menu-panel {
            background: linear-gradient(180deg, #fff7ea 0%, #ead8bb 100%);
            padding: 32px 36px;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            text-align: center;
            color: #2e2119;
            width: min(920px, calc(100vw - 48px));
        }
        .menu-panel h2 {
            margin: 0 0 8px;
            font-size: 34px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .menu-subtitle {
            margin: 0 0 28px;
            color: #6f5647;
            font-size: 18px;
        }
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }
        .bot-btn {
            border: none;
            border-radius: 16px;
            background: linear-gradient(180deg, #fffdfa 0%, #f1e4ce 100%);
            padding: 18px 16px 20px;
            cursor: pointer;
            box-shadow: 0 10px 18px rgba(88, 59, 37, 0.18);
            transition: transform 140ms ease, box-shadow 140ms ease;
            color: #2d221c;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bot-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 24px rgba(88, 59, 37, 0.25);
        }
        .bot-label {
            display: inline-block;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(46, 33, 25, 0.88);
            color: #fff7ea;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
            z-index: 2;
        }
        .bot-avatar {
            width: 98px;
            height: 98px;
            margin: 28px auto 14px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 -8px 16px rgba(0, 0, 0, 0.12), 0 8px 16px rgba(0, 0, 0, 0.14);
            background: radial-gradient(circle at 50% 35%, #f8e8d0 0%, #e1bc96 62%, #c18658 100%);
        }
        .bot-avatar * {
            position: absolute;
            pointer-events: none;
        }
        .bot-avatar::before {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -10px;
            width: 110px;
            height: 58px;
            transform: translateX(-50%);
            border-radius: 44px 44px 10px 10px;
            background: var(--shirt, #5c7cfa);
            z-index: 1;
        }
        .bot-avatar::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 10px;
            width: 72px;
            height: 28px;
            transform: translateX(-50%);
            border-radius: 36px 36px 20px 20px;
            background: var(--hair, #4f3526);
            box-shadow: 0 4px 0 4px var(--hair, #4f3526);
            z-index: 2;
        }
        .face {
            inset: 20px 21px 16px;
            border-radius: 32px 32px 28px 28px;
            background: linear-gradient(180deg, var(--skin-top, rgba(250, 234, 214, 0.95)), var(--skin-bottom, rgba(234, 194, 151, 0.98)));
            z-index: 3;
        }
        .eye {
            top: 38px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2a201b;
            z-index: 5;
        }
        .eye.left { left: 33px; }
        .eye.right { right: 33px; }
        .brow {
            top: 31px;
            width: 16px;
            height: 3px;
            border-radius: 999px;
            background: rgba(40, 28, 22, 0.72);
            z-index: 5;
        }
        .brow.left { left: 29px; transform: rotate(-10deg); }
        .brow.right { right: 29px; transform: rotate(10deg); }
        .nose {
            left: 50%;
            top: 42px;
            width: 8px;
            height: 14px;
            transform: translateX(-50%);
            border-radius: 40% 40% 55% 55%;
            background: rgba(164, 104, 79, 0.24);
            z-index: 4;
        }
        .mouth {
            left: 50%;
            top: 58px;
            width: 24px;
            height: 12px;
            transform: translateX(-50%);
            border-bottom: 3px solid #8e4c56;
            border-radius: 0 0 18px 18px;
            z-index: 5;
        }
        .mustache {
            left: 50%;
            top: 53px;
            width: 28px;
            height: 10px;
            transform: translateX(-50%);
            border-radius: 12px;
            background: linear-gradient(90deg, transparent 0%, var(--hair, #4f3526) 18%, var(--hair, #4f3526) 82%, transparent 100%);
            z-index: 6;
        }
        .beard {
            left: 50%;
            bottom: 17px;
            width: 34px;
            height: 24px;
            transform: translateX(-50%);
            border-radius: 12px 12px 18px 18px;
            background: var(--hair, #4f3526);
            opacity: 0.92;
            z-index: 4;
        }
        .goatee {
            left: 50%;
            bottom: 19px;
            width: 12px;
            height: 16px;
            transform: translateX(-50%);
            border-radius: 0 0 10px 10px;
            background: var(--hair, #4f3526);
            z-index: 5;
        }
        .glasses {
            left: 50%;
            top: 34px;
            width: 44px;
            height: 16px;
            transform: translateX(-50%);
            z-index: 6;
        }
        .glasses::before,
        .glasses::after {
            content: '';
            position: absolute;
            top: 0;
            width: 14px;
            height: 12px;
            border: 2px solid rgba(33, 28, 28, 0.82);
            border-radius: 5px;
        }
        .glasses::before { left: 4px; }
        .glasses::after { right: 4px; }
        .glasses-bridge {
            left: 50%;
            top: 40px;
            width: 10px;
            height: 2px;
            transform: translateX(-50%);
            background: rgba(33, 28, 28, 0.82);
            z-index: 6;
        }
        .monocle {
            left: 27px;
            top: 33px;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(166, 126, 34, 0.92);
            border-radius: 50%;
            z-index: 6;
        }
        .monocle::after {
            content: '';
            position: absolute;
            left: 12px;
            top: 14px;
            width: 2px;
            height: 18px;
            background: rgba(166, 126, 34, 0.92);
            transform: rotate(18deg);
        }
        .cap {
            left: 50%;
            top: 10px;
            width: 68px;
            height: 24px;
            transform: translateX(-50%);
            border-radius: 28px 28px 14px 14px;
            background: #22353f;
            z-index: 7;
        }
        .cap::after {
            content: '';
            position: absolute;
            right: -2px;
            bottom: -7px;
            width: 32px;
            height: 10px;
            border-radius: 8px;
            background: #18272f;
            transform: rotate(-10deg);
        }
        .bow {
            left: 50%;
            bottom: 8px;
            width: 16px;
            height: 10px;
            transform: translateX(-50%);
            background: #b23a48;
            clip-path: polygon(50% 50%, 100% 0, 100% 100%, 50% 62%, 0 100%, 0 0);
            z-index: 6;
        }
        .earring {
            right: 18px;
            top: 53px;
            width: 8px;
            height: 12px;
            border: 2px solid #cfab4a;
            border-radius: 50%;
            z-index: 6;
        }
        .scar {
            left: 35px;
            top: 28px;
            width: 3px;
            height: 18px;
            background: rgba(151, 58, 58, 0.48);
            transform: rotate(18deg);
            z-index: 6;
        }
        .bot-name {
            display: block;
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .bot-note {
            display: block;
            font-size: 14px;
            color: #735948;
        }
        .bot-easy { --shirt: #4daf7c; --hair: #5a3a28; }
        .bot-medium { --shirt: #4b70d1; --hair: #2d2320; }
        .bot-hard { --shirt: #cc7a3d; --hair: #6a4337; }
        .bot-impossible { --shirt: #7c4fd6; --hair: #1e1d2c; }
        .tone-light { --skin-top: #fdebd5; --skin-bottom: #efc89e; }
        .tone-warm { --skin-top: #f3d2aa; --skin-bottom: #d39a68; }
        .tone-deep { --skin-top: #c88d61; --skin-bottom: #8d5738; }
        .tone-olive { --skin-top: #e8c09c; --skin-bottom: #be865d; }
        @media (max-width: 860px) {
            .bot-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        @media (max-width: 520px) {
            .bot-grid {
                grid-template-columns: 1fr;
            }
            #chessboard {
                grid-template-columns: repeat(8, 42px);
                grid-template-rows: repeat(8, 42px);
            }
            .cell {
                width: 42px;
                height: 42px;
            }
            .piece {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <h1>1 Player Chess Game</h1>
    <div id="menu-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;">
        <div class="menu-panel">
            <h2>Select Bot Difficulty</h2>
            <p class="menu-subtitle">Choose which AI challenger you want to play.</p>
            <div class="bot-grid">
                <button class="bot-btn bot-easy tone-light" data-diff="easy">
                    <span class="bot-label">Easy</span>
                    <span class="bot-avatar">
                        <span class="face"></span>
                        <span class="brow left"></span>
                        <span class="brow right"></span>
                        <span class="eye left"></span>
                        <span class="eye right"></span>
                        <span class="nose"></span>
                        <span class="mouth"></span>
                        <span class="glasses"></span>
                        <span class="glasses-bridge"></span>
                    </span>
                    <span class="bot-name">Milo Spark</span>
                    <span class="bot-note">Casual learner bot</span>
                </button>
                <button class="bot-btn bot-easy tone-warm" data-diff="easy">
                    <span class="bot-label">Easy</span>
                    <span class="bot-avatar">
                        <span class="face"></span>
                        <span class="brow left"></span>
                        <span class="brow right"></span>
                        <span class="eye left"></span>
                        <span class="eye right"></span>
                        <span class="nose"></span>
                        <span class="mouth"></span>
                        <span class="bow"></span>
                        <span class="earring"></span>
                    </span>
                    <span class="bot-name">Poppy Flux</span>
                    <span class="bot-note">Friendly opener bot</span>
                </button>
                <button class="bot-btn bot-medium tone-olive" data-diff="medium">
                    <span class="bot-label">Medium</span>
                    <span class="bot-avatar">
                        <span class="face"></span>
                        <span class="brow left"></span>
                        <span class="brow right"></span>
                        <span class="eye left"></span>
                        <span class="eye right"></span>
                        <span class="nose"></span>
                        <span class="mouth"></span>
                        <span class="mustache"></span>
                    </span>
                    <span class="bot-name">Nova Byte</span>
                    <span class="bot-note">Balanced tactical bot</span>
                </button>
                <button class="bot-btn bot-medium tone-deep" data-diff="medium">
                    <span class="bot-label">Medium</span>
                    <span class="bot-avatar">
                        <span class="face"></span>
                        <span class="brow left"></span>
                        <span class="brow right"></span>
                        <span class="eye left"></span>
                        <span class="eye right"></span>
                        <span class="nose"></span>
                        <span class="mouth"></span>
                        <span class="cap"></span>
                    </span>
                    <span class="bot-name">Kira Vector</span>
                    <span class="bot-note">Steady counterplay bot</span>
                </button>
                <button class="bot-btn bot-hard tone-warm" data-diff="hard">
                    <span class="bot-label">Hard</span>
                    <span class="bot-avatar">
                        <span class="face"></span>
                        <span class="brow left"></span>
                        <span class="brow right"></span>
                        <span class="eye left"></span>
                        <span class="eye right"></span>
                        <span class="nose"></span>
                        <span class="mouth"></span>
                        <span class="beard"></span>
                        <span class="scar"></span>
                    </span>
                    <span class="bot-name">Rex Meridian</span>
                    <span class="bot-note">Sharp attacking bot</span>
                </button>
                <button class="bot-btn bot-hard tone-light" data-diff="hard">
                    <span class="bot-label">Hard</span>
                    <span class="bot-avatar">
                        <span class="face"></span>
                        <span class="brow left"></span>
                        <span class="brow right"></span>
                        <span class="eye left"></span>
                        <span class="eye right"></span>
                        <span class="nose"></span>
                        <span class="mouth"></span>
                        <span class="monocle"></span>
                        <span class="goatee"></span>
                    </span>
                    <span class="bot-name">Iris Quill</span>
                    <span class="bot-note">Methodical pressure bot</span>
                </button>
                <button class="bot-btn bot-impossible tone-olive" data-diff="impossible">
                    <span class="bot-label">Impossible</span>
                    <span class="bot-avatar">
                        <span class="face"></span>
                        <span class="brow left"></span>
                        <span class="brow right"></span>
                        <span class="eye left"></span>
                        <span class="eye right"></span>
                        <span class="nose"></span>
                        <span class="mouth"></span>
                        <span class="glasses"></span>
                        <span class="glasses-bridge"></span>
                        <span class="beard"></span>
                    </span>
                    <span class="bot-name">Zara Hex</span>
                    <span class="bot-note">Relentless master bot</span>
                </button>
                <button class="bot-btn bot-impossible tone-deep" data-diff="impossible">
                    <span class="bot-label">Impossible</span>
                    <span class="bot-avatar">
                        <span class="face"></span>
                        <span class="brow left"></span>
                        <span class="brow right"></span>
                        <span class="eye left"></span>
                        <span class="eye right"></span>
                        <span class="nose"></span>
                        <span class="mouth"></span>
                        <span class="cap"></span>
                        <span class="mustache"></span>
                    </span>
                    <span class="bot-name">Onyx Vale</span>
                    <span class="bot-note">Cold calculation bot</span>
                </button>
            </div>
        </div>
    </div>
    <div id="status">Your move (White)</div>
    <div id="gameover-title" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:20;align-items:center;justify-content:center;flex-direction:column;font-size:64px;color:#fff;font-weight:bold;text-shadow:2px 2px 8px #000;">
        <span id="gameover-heading">Game Over</span>
        <div id="gameover-msg" style="font-size:32px;margin-top:20px;"></div>
        <button id="restart-btn" style="margin-top:40px;font-size:28px;padding:12px 36px;border-radius:8px;border:none;background:#2196f3;color:#fff;cursor:pointer;box-shadow:0 2px 8px #0003;">Restart</button>
    </div>
    <div id="chessboard"></div>
    <script src="script.js"></script>
</body>
</html>
