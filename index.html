<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Player Chess Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            background: radial-gradient(circle at top, #32524a 0%, #173029 48%, #0f201c 100%);
            color: #f6ebda;
        }
        h1 {
            margin-top: 28px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #game-shell {
            width: min(1120px, calc(100vw - 32px));
            margin-top: 20px;
            display: grid;
            grid-template-columns: minmax(0, auto) minmax(300px, 360px);
            gap: 24px;
            align-items: start;
        }
        #board-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #board-hud {
            width: min(100%, 604px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 72px);
            grid-template-rows: repeat(8, 72px);
            margin-top: 16px;
            border: 14px solid #4b3224;
            border-radius: 12px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35), inset 0 0 0 2px rgba(255, 242, 223, 0.12);
            overflow: hidden;
        }
        .cell {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 120ms ease, filter 120ms ease;
        }
        .cell:hover {
            filter: brightness(1.05);
        }
        .cell.legal-target::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(44, 149, 255, 0.72);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.14);
            pointer-events: none;
        }
        .cell.capture-target::after {
            width: 24px;
            height: 24px;
            background: rgba(44, 149, 255, 0.4);
            box-shadow: 0 0 0 4px rgba(44, 149, 255, 0.28);
        }
        .white { background: linear-gradient(145deg, #f2dfbf 0%, #dbc19a 100%); }
        .black { background: linear-gradient(145deg, #8e6548 0%, #68462f 100%); }
        .selected { outline: 3px solid #4ec4ff; outline-offset: -3px; }
        .piece {
            font-size: 46px;
            line-height: 1;
            user-select: none;
            transform: translateY(-1px);
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.35));
        }
        .piece-white {
            color: #fff7eb;
            text-shadow: 0 1px 0 #ffffff, 0 0 8px rgba(255, 248, 230, 0.45), 0 2px 0 #ccb998, 0 3px 5px rgba(72, 47, 28, 0.35);
        }
        .piece-black {
            color: #1a1613;
            text-shadow: 0 1px 0 rgba(255, 236, 213, 0.18), 0 0 6px rgba(0, 0, 0, 0.28), 0 3px 5px rgba(0, 0, 0, 0.45);
        }
        .piece::after {
            content: '';
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0) 70%);
            pointer-events: none;
        }
        .moving-piece {
            position: fixed;
            z-index: 50;
            pointer-events: none;
            transition: transform 220ms ease-in-out;
            will-change: transform;
        }
        #status {
            margin-top: 0;
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 20px;
            background: rgba(255, 248, 233, 0.12);
            box-shadow: inset 0 0 0 1px rgba(255, 245, 228, 0.14);
        }
        #sound-toggle {
            border: none;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 248, 233, 0.16);
            color: #fff3de;
            font: inherit;
            font-size: 15px;
            letter-spacing: 0.04em;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(255, 245, 228, 0.14);
            transition: background 120ms ease, transform 120ms ease;
        }
        #sound-toggle:hover {
            background: rgba(255, 248, 233, 0.24);
            transform: translateY(-1px);
        }
        #sound-toggle.muted {
            background: rgba(99, 73, 60, 0.26);
            color: rgba(255, 243, 222, 0.74);
        }
        #bot-commentary {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            align-items: start;
        }
        #bot-portrait-card {
            min-height: 0;
            padding: 0;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
            cursor: default;
            transform: none;
        }
        #bot-portrait-card::before {
            content: none;
        }
        #bot-portrait-card:hover {
            transform: none;
            box-shadow: none;
        }
        #bot-portrait-shell {
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #bot-portrait-shell .bot-avatar {
            margin: 0;
            transform: scale(1.02);
        }
        #trash-talk {
            padding: 14px 16px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(34, 23, 18, 0.76) 0%, rgba(18, 13, 10, 0.86) 100%);
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.2), inset 0 0 0 1px rgba(255, 237, 211, 0.1);
            color: #f8eedf;
            position: relative;
            min-height: 132px;
        }
        #trash-talk::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 36px;
            width: 24px;
            height: 24px;
            background: rgba(27, 19, 15, 0.92);
            transform: rotate(45deg);
            border-radius: 4px;
            box-shadow: inset 1px 1px 0 rgba(255, 237, 211, 0.08);
        }
        #trash-talk-name {
            display: block;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #f2c47b;
            margin-bottom: 8px;
        }
        #trash-talk-message {
            margin: 0;
            font-size: 20px;
            line-height: 1.45;
            color: #fff6ea;
        }
        .menu-panel {
            background: linear-gradient(180deg, #fff7ea 0%, #ead8bb 100%);
            padding: 32px 36px;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            text-align: center;
            color: #2e2119;
            width: min(920px, calc(100vw - 48px));
        }
        .menu-panel h2 {
            margin: 0 0 8px;
            font-size: 34px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .menu-subtitle {
            margin: 0 0 28px;
            color: #6f5647;
            font-size: 18px;
        }
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }
        .bot-btn {
            border: none;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255, 252, 245, 0.96) 0%, rgba(241, 228, 206, 0.94) 100%);
            padding: 20px 16px 22px;
            cursor: pointer;
            box-shadow: 0 14px 24px rgba(88, 59, 37, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.72);
            transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
            color: #2d221c;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            isolation: isolate;
        }
        .bot-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.6), transparent 48%);
            z-index: -1;
        }
        .bot-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(88, 59, 37, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        .bot-label {
            display: inline-block;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(35, 30, 28, 0.9);
            color: #fff7ea;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
            z-index: 2;
        }
        .bot-avatar {
            width: 112px;
            height: 124px;
            margin: 26px auto 14px;
            border-radius: 34px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 -12px 22px rgba(0, 0, 0, 0.14), 0 10px 18px rgba(0, 0, 0, 0.14);
            background: linear-gradient(180deg, rgba(255, 251, 243, 0.95) 0%, rgba(226, 204, 176, 0.9) 100%);
        }
        .bot-avatar * {
            position: absolute;
            pointer-events: none;
        }
        .bot-avatar::before {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -12px;
            width: 128px;
            height: 64px;
            transform: translateX(-50%);
            border-radius: 46px 46px 16px 16px;
            background: linear-gradient(180deg, var(--shirt-light, #7c98ff), var(--shirt, #5c7cfa));
            z-index: 1;
        }
        .bot-avatar::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 6px;
            width: 82px;
            height: 34px;
            transform: translateX(-50%);
            border-radius: 42px 42px 18px 18px;
            background:
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.14), transparent 28%),
                radial-gradient(circle at 68% 18%, rgba(255, 255, 255, 0.12), transparent 26%),
                linear-gradient(180deg, var(--hair-shine, #705040), var(--hair, #4f3526));
            clip-path: polygon(0% 54%, 4% 31%, 12% 15%, 22% 7%, 34% 2%, 50% 0%, 66% 2%, 78% 7%, 88% 15%, 96% 31%, 100% 54%, 94% 62%, 89% 72%, 82% 66%, 74% 78%, 62% 70%, 50% 84%, 38% 70%, 26% 78%, 18% 66%, 11% 72%, 6% 62%);
            box-shadow: 0 8px 0 1px var(--hair, #4f3526);
            z-index: 2;
        }
        .face {
            inset: 18px 23px 22px;
            border-radius: 36px 36px 28px 28px;
            background: linear-gradient(180deg, var(--skin-top, rgba(250, 234, 214, 0.95)), var(--skin-bottom, rgba(234, 194, 151, 0.98)));
            z-index: 3;
        }
        .forehead-shine {
            left: 50%;
            top: 24px;
            width: 30px;
            height: 14px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.22), transparent 72%);
            z-index: 4;
        }
        .temple-shadow {
            top: 44px;
            width: 10px;
            height: 24px;
            border-radius: 50%;
            background: rgba(126, 84, 62, 0.1);
            filter: blur(1px);
            z-index: 4;
        }
        .temple-shadow.left { left: 21px; }
        .temple-shadow.right { right: 21px; }
        .jaw-shadow {
            left: 50%;
            bottom: 22px;
            width: 40px;
            height: 18px;
            transform: translateX(-50%);
            border-radius: 0 0 20px 20px;
            background: rgba(128, 83, 61, 0.12);
            z-index: 4;
        }
        .jawline {
            left: 50%;
            bottom: 19px;
            width: 46px;
            height: 24px;
            transform: translateX(-50%);
            border-bottom: 2px solid rgba(120, 74, 55, 0.34);
            border-left: 1px solid rgba(120, 74, 55, 0.14);
            border-right: 1px solid rgba(120, 74, 55, 0.14);
            border-radius: 0 0 24px 24px;
            z-index: 4;
        }
        .chin-line {
            left: 50%;
            bottom: 23px;
            width: 18px;
            height: 8px;
            transform: translateX(-50%);
            border-bottom: 2px solid rgba(120, 74, 55, 0.26);
            border-radius: 0 0 12px 12px;
            z-index: 5;
        }
        .neck {
            left: 50%;
            bottom: 22px;
            width: 20px;
            height: 18px;
            transform: translateX(-50%);
            border-radius: 0 0 10px 10px;
            background: linear-gradient(180deg, var(--skin-bottom, rgba(234, 194, 151, 0.98)), rgba(177, 118, 84, 0.9));
            z-index: 2;
        }
        .ear {
            top: 52px;
            width: 10px;
            height: 18px;
            border-radius: 10px;
            background: var(--skin-bottom, rgba(234, 194, 151, 0.98));
            z-index: 2;
        }
        .ear.left { left: 18px; }
        .ear.right { right: 18px; }
        .eye {
            top: 47px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fffdf7;
            box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.08);
            z-index: 5;
        }
        .eye.left { left: 31px; }
        .eye.right { right: 31px; }
        .eyelid {
            top: 45px;
            width: 16px;
            height: 8px;
            border-top: 2px solid rgba(128, 87, 68, 0.38);
            border-radius: 50%;
            z-index: 6;
        }
        .eyelid.left { left: 29px; }
        .eyelid.right { right: 29px; }
        .lash {
            top: 44px;
            width: 14px;
            height: 5px;
            border-top: 2px solid rgba(42, 32, 27, 0.45);
            border-radius: 50%;
            z-index: 6;
        }
        .lash.left { left: 30px; }
        .lash.right { right: 30px; }
        .iris {
            top: 50px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--eye, #2b2726);
            z-index: 6;
            box-shadow: 0 0 0 1px rgba(20, 18, 16, 0.08);
        }
        .iris::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
        }
        .iris.left { left: 34px; }
        .iris.right { right: 34px; }
        .brow {
            top: 39px;
            width: 18px;
            height: 3px;
            border-radius: 999px;
            background: rgba(40, 28, 22, 0.72);
            z-index: 5;
        }
        .brow.left { left: 28px; transform: rotate(-10deg); }
        .brow.right { right: 28px; transform: rotate(10deg); }
        .nose {
            left: 50%;
            top: 54px;
            width: 8px;
            height: 15px;
            transform: translateX(-50%);
            border-radius: 40% 40% 55% 55%;
            background: rgba(164, 104, 79, 0.24);
            z-index: 4;
        }
        .nose-bridge {
            left: 50%;
            top: 47px;
            width: 3px;
            height: 12px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            z-index: 5;
        }
        .nostril {
            top: 66px;
            width: 4px;
            height: 3px;
            border-radius: 50%;
            background: rgba(132, 81, 62, 0.25);
            z-index: 5;
        }
        .nostril.left { left: 50px; }
        .nostril.right { right: 50px; }
        .mouth {
            left: 50%;
            top: 74px;
            width: 26px;
            height: 12px;
            transform: translateX(-50%);
            border-bottom: 3px solid #8e4c56;
            border-radius: 0 0 18px 18px;
            z-index: 5;
        }
        .philtrum {
            left: 50%;
            top: 71px;
            width: 2px;
            height: 5px;
            transform: translateX(-50%);
            background: rgba(147, 88, 85, 0.18);
            z-index: 5;
        }
        .upper-lip {
            left: 50%;
            top: 76px;
            width: 20px;
            height: 4px;
            transform: translateX(-50%);
            border-top: 2px solid rgba(150, 83, 95, 0.35);
            border-radius: 50%;
            z-index: 5;
        }
        .lower-lip {
            left: 50%;
            top: 81px;
            width: 18px;
            height: 6px;
            transform: translateX(-50%);
            border-radius: 0 0 12px 12px;
            background: rgba(187, 112, 116, 0.18);
            z-index: 4;
        }
        .cheek {
            top: 67px;
            width: 12px;
            height: 8px;
            border-radius: 50%;
            background: rgba(229, 136, 132, 0.18);
            filter: blur(1px);
            z-index: 4;
        }
        .cheek.left { left: 26px; }
        .cheek.right { right: 26px; }
        .chin-highlight {
            left: 50%;
            bottom: 28px;
            width: 16px;
            height: 8px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            z-index: 4;
        }
        .mustache {
            left: 50%;
            top: 68px;
            width: 32px;
            height: 10px;
            transform: translateX(-50%);
            border-radius: 12px;
            background: linear-gradient(90deg, transparent 0%, var(--hair-shine, #705040) 14%, var(--hair, #4f3526) 38%, var(--hair, #4f3526) 62%, var(--hair-shine, #705040) 86%, transparent 100%);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.14);
            z-index: 6;
        }
        .mustache::before,
        .mustache::after {
            content: '';
            position: absolute;
            top: 1px;
            width: 14px;
            height: 8px;
            background: linear-gradient(180deg, var(--hair-shine, #705040), var(--hair, #4f3526));
            border-radius: 10px;
        }
        .mustache::before {
            left: 1px;
            transform: rotate(8deg);
            clip-path: polygon(0 35%, 100% 0, 100% 100%, 0 100%);
        }
        .mustache::after {
            right: 1px;
            transform: rotate(-8deg);
            clip-path: polygon(0 0, 100% 35%, 100% 100%, 0 100%);
        }
        .beard {
            left: 50%;
            bottom: 20px;
            width: 38px;
            height: 26px;
            transform: translateX(-50%);
            border-radius: 12px 12px 18px 18px;
            background: linear-gradient(180deg, var(--hair-shine, #705040), var(--hair, #4f3526));
            opacity: 0.92;
            z-index: 4;
        }
        .beard::before {
            content: '';
            position: absolute;
            inset: 2px 4px 5px;
            border-radius: 10px 10px 14px 14px;
            background: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0 2px, rgba(0, 0, 0, 0.04) 2px 4px);
            opacity: 0.45;
        }
        .goatee {
            left: 50%;
            bottom: 21px;
            width: 12px;
            height: 16px;
            transform: translateX(-50%);
            border-radius: 0 0 10px 10px;
            background: linear-gradient(180deg, var(--hair-shine, #705040), var(--hair, #4f3526));
            z-index: 5;
        }
        .goatee::before {
            content: '';
            position: absolute;
            inset: 1px 2px 4px;
            border-radius: 0 0 8px 8px;
            background: repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0 2px, rgba(0, 0, 0, 0.03) 2px 4px);
        }
        .glasses {
            left: 50%;
            top: 44px;
            width: 48px;
            height: 18px;
            transform: translateX(-50%);
            z-index: 6;
            filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.22));
            background:
                linear-gradient(90deg, rgba(40, 33, 31, 0.88), rgba(61, 53, 50, 0.88)) left 0 top 7px / 8px 2px no-repeat,
                linear-gradient(90deg, rgba(40, 33, 31, 0.88), rgba(61, 53, 50, 0.88)) right 0 top 7px / 8px 2px no-repeat;
        }
        .glasses::before,
        .glasses::after {
            content: '';
            position: absolute;
            top: 0;
            width: 16px;
            height: 13px;
            border: 2px solid rgba(33, 28, 28, 0.9);
            border-radius: 6px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(205, 220, 230, 0.08) 38%, rgba(77, 93, 104, 0.16) 100%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.25), transparent 42%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), inset 0 -1px 0 rgba(0, 0, 0, 0.12);
        }
        .glasses::before { left: 4px; }
        .glasses::after { right: 4px; }
        .glasses-bridge {
            left: 50%;
            top: 51px;
            width: 10px;
            height: 3px;
            transform: translateX(-50%);
            background: linear-gradient(180deg, rgba(88, 77, 72, 0.95), rgba(28, 23, 21, 0.95));
            border-radius: 999px;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
            z-index: 6;
        }
        .monocle {
            left: 27px;
            top: 43px;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(171, 134, 47, 0.96);
            border-radius: 50%;
            z-index: 6;
            background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.06) 48%, rgba(81, 70, 37, 0.12) 100%);
            box-shadow: inset 0 0 0 1px rgba(255, 242, 201, 0.35), 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        .monocle::after {
            content: '';
            position: absolute;
            left: 12px;
            top: 14px;
            width: 2px;
            height: 18px;
            background: linear-gradient(180deg, rgba(203, 169, 86, 0.98), rgba(132, 97, 28, 0.98));
            transform: rotate(18deg);
        }
        .cap {
            left: 50%;
            top: 7px;
            width: 76px;
            height: 28px;
            transform: translateX(-50%);
            border-radius: 28px 28px 14px 14px;
            background: linear-gradient(180deg, #324c5d, #22353f);
            z-index: 7;
        }
        .cap::after {
            content: '';
            position: absolute;
            right: -2px;
            bottom: -7px;
            width: 32px;
            height: 10px;
            border-radius: 8px;
            background: #18272f;
            transform: rotate(-10deg);
        }
        .bow {
            left: 50%;
            bottom: 14px;
            width: 18px;
            height: 12px;
            transform: translateX(-50%);
            background: #b23a48;
            clip-path: polygon(50% 50%, 100% 0, 100% 100%, 50% 62%, 0 100%, 0 0);
            z-index: 6;
        }
        .hoodie {
            left: 50%;
            bottom: 0;
            width: 82px;
            height: 52px;
            transform: translateX(-50%);
            border-radius: 28px 28px 8px 8px;
