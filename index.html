<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Player Chess Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            background: radial-gradient(circle at top, #32524a 0%, #173029 48%, #0f201c 100%);
            color: #f6ebda;
        }
        h1 {
            margin-top: 28px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #chessboard {
            display: grid;
            grid-template-columns: repeat(8, 72px);
            grid-template-rows: repeat(8, 72px);
            margin-top: 24px;
            border: 14px solid #4b3224;
            border-radius: 12px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35), inset 0 0 0 2px rgba(255, 242, 223, 0.12);
            overflow: hidden;
        }
        .cell {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 120ms ease, filter 120ms ease;
        }
        .cell:hover {
            filter: brightness(1.05);
        }
        .white { background: linear-gradient(145deg, #f2dfbf 0%, #dbc19a 100%); }
        .black { background: linear-gradient(145deg, #8e6548 0%, #68462f 100%); }
        .selected { outline: 3px solid #4ec4ff; outline-offset: -3px; }
        .piece {
            font-size: 46px;
            line-height: 1;
            user-select: none;
            transform: translateY(-1px);
            filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.35));
        }
        .piece-white {
            color: #fff7eb;
            text-shadow: 0 1px 0 #ffffff, 0 0 8px rgba(255, 248, 230, 0.45), 0 2px 0 #ccb998, 0 3px 5px rgba(72, 47, 28, 0.35);
        }
        .piece-black {
            color: #1a1613;
            text-shadow: 0 1px 0 rgba(255, 236, 213, 0.18), 0 0 6px rgba(0, 0, 0, 0.28), 0 3px 5px rgba(0, 0, 0, 0.45);
        }
        .piece::after {
            content: '';
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0) 70%);
            pointer-events: none;
        }
        #status {
            margin-top: 14px;
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 20px;
            background: rgba(255, 248, 233, 0.12);
            box-shadow: inset 0 0 0 1px rgba(255, 245, 228, 0.14);
        }
        .menu-panel {
            background: linear-gradient(180deg, #fff7ea 0%, #ead8bb 100%);
            padding: 32px 36px;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
            text-align: center;
            color: #2e2119;
            width: min(920px, calc(100vw - 48px));
        }
        .menu-panel h2 {
            margin: 0 0 8px;
            font-size: 34px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .menu-subtitle {
            margin: 0 0 28px;
            color: #6f5647;
            font-size: 18px;
        }
        .bot-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }
        .bot-btn {
            border: none;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255, 252, 245, 0.96) 0%, rgba(241, 228, 206, 0.94) 100%);
            padding: 20px 16px 22px;
            cursor: pointer;
            box-shadow: 0 14px 24px rgba(88, 59, 37, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.72);
            transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
            color: #2d221c;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            isolation: isolate;
        }
        .bot-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.6), transparent 48%);
            z-index: -1;
        }
        .bot-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px rgba(88, 59, 37, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        .bot-label {
            display: inline-block;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(35, 30, 28, 0.9);
            color: #fff7ea;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
            z-index: 2;
        }
        .bot-avatar {
            width: 112px;
            height: 124px;
            margin: 26px auto 14px;
            border-radius: 34px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 -12px 22px rgba(0, 0, 0, 0.14), 0 10px 18px rgba(0, 0, 0, 0.14);
            background: linear-gradient(180deg, rgba(255, 251, 243, 0.95) 0%, rgba(226, 204, 176, 0.9) 100%);
        }
        .bot-avatar * {
            position: absolute;
            pointer-events: none;
        }
        .bot-avatar::before {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -12px;
            width: 128px;
            height: 64px;
            transform: translateX(-50%);
            border-radius: 46px 46px 16px 16px;
            background: linear-gradient(180deg, var(--shirt-light, #7c98ff), var(--shirt, #5c7cfa));
            z-index: 1;
        }
        .bot-avatar::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 8px;
            width: 78px;
            height: 30px;
            transform: translateX(-50%);
            border-radius: 38px 38px 16px 16px;
            background: linear-gradient(180deg, var(--hair-shine, #705040), var(--hair, #4f3526));
            box-shadow: 0 6px 0 3px var(--hair, #4f3526);
            z-index: 2;
        }
        .face {
            inset: 18px 23px 22px;
            border-radius: 36px 36px 28px 28px;
            background: linear-gradient(180deg, var(--skin-top, rgba(250, 234, 214, 0.95)), var(--skin-bottom, rgba(234, 194, 151, 0.98)));
            z-index: 3;
        }
        .jaw-shadow {
            left: 50%;
            bottom: 22px;
            width: 40px;
            height: 18px;
            transform: translateX(-50%);
            border-radius: 0 0 20px 20px;
            background: rgba(128, 83, 61, 0.12);
            z-index: 4;
        }
        .neck {
            left: 50%;
            bottom: 22px;
            width: 20px;
            height: 18px;
            transform: translateX(-50%);
            border-radius: 0 0 10px 10px;
            background: linear-gradient(180deg, var(--skin-bottom, rgba(234, 194, 151, 0.98)), rgba(177, 118, 84, 0.9));
            z-index: 2;
        }
        .ear {
            top: 52px;
            width: 10px;
            height: 18px;
            border-radius: 10px;
            background: var(--skin-bottom, rgba(234, 194, 151, 0.98));
            z-index: 2;
        }
        .ear.left { left: 18px; }
        .ear.right { right: 18px; }
        .eye {
            top: 47px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fffdf7;
            box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.08);
            z-index: 5;
        }
        .eye.left { left: 31px; }
        .eye.right { right: 31px; }
        .iris {
            top: 50px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--eye, #2b2726);
            z-index: 6;
            box-shadow: 0 0 0 1px rgba(20, 18, 16, 0.08);
        }
        .iris::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
        }
        .iris.left { left: 34px; }
        .iris.right { right: 34px; }
        .brow {
            top: 39px;
            width: 18px;
            height: 3px;
            border-radius: 999px;
            background: rgba(40, 28, 22, 0.72);
            z-index: 5;
        }
        .brow.left { left: 28px; transform: rotate(-10deg); }
        .brow.right { right: 28px; transform: rotate(10deg); }
        .nose {
            left: 50%;
            top: 54px;
            width: 8px;
            height: 15px;
            transform: translateX(-50%);
            border-radius: 40% 40% 55% 55%;
            background: rgba(164, 104, 79, 0.24);
            z-index: 4;
        }
        .mouth {
            left: 50%;
            top: 74px;
            width: 26px;
            height: 12px;
            transform: translateX(-50%);
            border-bottom: 3px solid #8e4c56;
            border-radius: 0 0 18px 18px;
            z-index: 5;
        }
        .cheek {
            top: 67px;
            width: 12px;
            height: 8px;
            border-radius: 50%;
            background: rgba(229, 136, 132, 0.18);
            filter: blur(1px);
            z-index: 4;
        }
        .cheek.left { left: 26px; }
        .cheek.right { right: 26px; }
        .mustache {
            left: 50%;
            top: 68px;
            width: 32px;
            height: 10px;
            transform: translateX(-50%);
            border-radius: 12px;
            background: linear-gradient(90deg, transparent 0%, var(--hair, #4f3526) 18%, var(--hair, #4f3526) 82%, transparent 100%);
            z-index: 6;
        }
        .beard {
            left: 50%;
            bottom: 20px;
            width: 38px;
            height: 26px;
            transform: translateX(-50%);
            border-radius: 12px 12px 18px 18px;
            background: linear-gradient(180deg, var(--hair-shine, #705040), var(--hair, #4f3526));
            opacity: 0.92;
            z-index: 4;
        }
        .goatee {
            left: 50%;
            bottom: 21px;
            width: 12px;
            height: 16px;
            transform: translateX(-50%);
            border-radius: 0 0 10px 10px;
            background: linear-gradient(180deg, var(--hair-shine, #705040), var(--hair, #4f3526));
            z-index: 5;
        }
        .glasses {
            left: 50%;
            top: 44px;
            width: 48px;
            height: 18px;
            transform: translateX(-50%);
            z-index: 6;
        }
        .glasses::before,
        .glasses::after {
            content: '';
            position: absolute;
            top: 0;
            width: 16px;
            height: 13px;
            border: 2px solid rgba(33, 28, 28, 0.82);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
        }
        .glasses::before { left: 4px; }
        .glasses::after { right: 4px; }
        .glasses-bridge {
            left: 50%;
            top: 51px;
            width: 10px;
            height: 2px;
            transform: translateX(-50%);
            background: rgba(33, 28, 28, 0.82);
            z-index: 6;
        }
        .monocle {
            left: 27px;
            top: 43px;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(166, 126, 34, 0.92);
            border-radius: 50%;
            z-index: 6;
        }
        .monocle::after {
            content: '';
            position: absolute;
            left: 12px;
            top: 14px;
            width: 2px;
            height: 18px;
            background: rgba(166, 126, 34, 0.92);
            transform: rotate(18deg);
        }
        .cap {
            left: 50%;
            top: 7px;
            width: 76px;
            height: 28px;
            transform: translateX(-50%);
            border-radius: 28px 28px 14px 14px;
            background: linear-gradient(180deg, #324c5d, #22353f);
            z-index: 7;
        }
        .cap::after {
            content: '';
            position: absolute;
            right: -2px;
            bottom: -7px;
            width: 32px;
            height: 10px;
            border-radius: 8px;
            background: #18272f;
            transform: rotate(-10deg);
        }
        .bow {
            left: 50%;
            bottom: 14px;
            width: 18px;
            height: 12px;
            transform: translateX(-50%);
            background: #b23a48;
            clip-path: polygon(50% 50%, 100% 0, 100% 100%, 50% 62%, 0 100%, 0 0);
            z-index: 6;
        }
        .hoodie {
            left: 50%;
            bottom: 0;
            width: 82px;
            height: 52px;
            transform: translateX(-50%);
            border-radius: 28px 28px 8px 8px;
            background: linear-gradient(180deg, rgba(255,255,255,0.16), transparent 24%), linear-gradient(180deg, var(--shirt-light, #7c98ff), var(--shirt, #5c7cfa));
            z-index: 1;
        }
        .hoodie::before,
        .hoodie::after {
            content: '';
            position: absolute;
            top: 6px;
            width: 18px;
            height: 24px;
            border-radius: 18px 18px 8px 8px;
            background: rgba(255,255,255,0.12);
        }
        .hoodie::before { left: 14px; transform: rotate(16deg); }
        .hoodie::after { right: 14px; transform: rotate(-16deg); }
        .chain {
            left: 50%;
            bottom: 20px;
            width: 28px;
            height: 14px;
            transform: translateX(-50%);
            border-bottom: 2px solid rgba(211, 178, 93, 0.95);
            border-radius: 0 0 20px 20px;
            z-index: 3;
        }
        .headset {
            left: 50%;
            top: 28px;
            width: 74px;
            height: 56px;
            transform: translateX(-50%);
            border: 4px solid rgba(46, 53, 64, 0.92);
            border-bottom: none;
            border-radius: 40px 40px 0 0;
            z-index: 6;
        }
        .headset::before,
        .headset::after {
            content: '';
            position: absolute;
            top: 18px;
            width: 10px;
            height: 20px;
            border-radius: 10px;
            background: rgba(46, 53, 64, 0.92);
        }
        .headset::before { left: -7px; }
        .headset::after { right: -7px; }
        .visor {
            left: 50%;
            top: 38px;
            width: 48px;
            height: 14px;
            transform: translateX(-50%);
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(53, 223, 255, 0.6), rgba(114, 114, 255, 0.5));
            z-index: 6;
            box-shadow: 0 0 12px rgba(53, 223, 255, 0.25);
        }
        .earring {
            right: 18px;
            top: 63px;
            width: 8px;
            height: 12px;
            border: 2px solid #cfab4a;
            border-radius: 50%;
            z-index: 6;
        }
        .scar {
            left: 35px;
            top: 38px;
            width: 3px;
            height: 18px;
            background: rgba(151, 58, 58, 0.48);
            transform: rotate(18deg);
            z-index: 6;
        }
        .bot-name {
            display: block;
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .bot-note {
            display: block;
            font-size: 14px;
            color: #735948;
        }
        .bot-easy { --shirt: #4daf7c; --shirt-light: #79d9a6; --hair: #5a3a28; --hair-shine: #7c5540; --eye: #2f4b3b; }
        .bot-medium { --shirt: #4b70d1; --shirt-light: #86a5ff; --hair: #2d2320; --hair-shine: #54413b; --eye: #35517e; }
        .bot-hard { --shirt: #cc7a3d; --shirt-light: #f0a66a; --hair: #6a4337; --hair-shine: #946154; --eye: #5f3f2e; }
        .bot-impossible { --shirt: #7c4fd6; --shirt-light: #af84ff; --hair: #1e1d2c; --hair-shine: #4e496d; --eye: #3a2f66; }
        .tone-light { --skin-top: #fdebd5; --skin-bottom: #efc89e; }
        .tone-warm { --skin-top: #f3d2aa; --skin-bottom: #d39a68; }
        .tone-deep { --skin-top: #c88d61; --skin-bottom: #8d5738; }
        .tone-olive { --skin-top: #e8c09c; --skin-bottom: #be865d; }
        .char-milo .bot-avatar {
            border-radius: 38px 38px 28px 28px;
        }
        .char-milo .face {
            inset: 16px 24px 20px;
            border-radius: 36px 36px 30px 30px;
        }
        .char-milo .bot-avatar::after {
            width: 82px;
            height: 34px;
            border-radius: 42px 42px 18px 18px;
            box-shadow: 0 8px 0 4px var(--hair);
        }
        .char-milo .hoodie {
            width: 90px;
            border-radius: 30px 30px 10px 10px;
        }

        .char-poppy .bot-avatar {
            border-radius: 34px 34px 30px 30px;
        }
        .char-poppy .face {
            inset: 17px 25px 21px;
            border-radius: 40px 40px 24px 24px;
        }
        .char-poppy .eye {
            width: 13px;
            height: 13px;
            top: 46px;
        }
        .char-poppy .iris {
            top: 49px;
            background: #3e5a4c;
        }
        .char-poppy .bot-avatar::after {
            width: 88px;
            height: 26px;
            top: 11px;
            border-radius: 40px 40px 12px 12px;
            box-shadow: 0 12px 0 8px var(--hair), 18px 24px 0 -6px var(--hair), -18px 24px 0 -6px var(--hair);
        }
        .char-poppy .mouth {
            width: 22px;
            border-bottom-width: 2px;
        }
        .char-poppy .hoodie {
            width: 78px;
            border-radius: 24px 24px 8px 8px;
        }

        .char-nova .bot-avatar {
            border-radius: 28px 28px 22px 22px;
        }
        .char-nova .face {
            inset: 18px 20px 20px;
            border-radius: 28px 28px 20px 20px;
        }
        .char-nova .jaw-shadow {
            width: 46px;
            height: 20px;
        }
        .char-nova .bot-avatar::after {
            width: 76px;
            height: 26px;
            box-shadow: 0 5px 0 2px var(--hair), 0 18px 0 -6px var(--hair);
        }
        .char-nova .hoodie {
            width: 94px;
            height: 54px;
        }
        .char-nova .brow.left { transform: rotate(-4deg); }
        .char-nova .brow.right { transform: rotate(4deg); }

        .char-kira .bot-avatar {
            border-radius: 28px;
        }
        .char-kira .face {
            inset: 17px 27px 22px;
            border-radius: 34px 34px 22px 22px;
        }
        .char-kira .eye {
            width: 11px;
            height: 9px;
            top: 48px;
            border-radius: 10px;
        }
        .char-kira .iris {
            top: 50px;
            background: #274567;
        }
        .char-kira .bot-avatar::after {
            width: 68px;
            height: 18px;
            top: 16px;
            border-radius: 24px 24px 10px 10px;
            box-shadow: 0 4px 0 2px var(--hair);
        }
        .char-kira .hoodie {
            width: 84px;
            height: 50px;
            border-radius: 20px 20px 6px 6px;
        }

        .char-rex .bot-avatar {
            border-radius: 30px 30px 24px 24px;
        }
        .char-rex .face {
            inset: 17px 19px 20px;
            border-radius: 30px 30px 24px 24px;
        }
        .char-rex .bot-avatar::after {
            width: 74px;
            height: 22px;
            top: 14px;
            border-radius: 34px 34px 10px 10px;
            box-shadow: 0 6px 0 3px var(--hair), 0 16px 0 -8px var(--hair);
        }
        .char-rex .hoodie {
            width: 98px;
            height: 56px;
            border-radius: 32px 32px 10px 10px;
        }
        .char-rex .brow.left { transform: rotate(-14deg); }
        .char-rex .brow.right { transform: rotate(14deg); }
        .char-rex .eye,
        .char-rex .iris {
            top: 49px;
        }

        .char-iris .bot-avatar {
            border-radius: 36px 36px 28px 28px;
        }
        .char-iris .face {
            inset: 16px 26px 22px;
            border-radius: 40px 40px 26px 26px;
        }
        .char-iris .bot-avatar::after {
            width: 80px;
            height: 22px;
            top: 10px;
            border-radius: 38px 38px 8px 8px;
            box-shadow: 0 10px 0 7px var(--hair);
        }
        .char-iris .hoodie {
            width: 76px;
            height: 46px;
            border-radius: 14px 14px 8px 8px;
        }
        .char-iris .chain {
            bottom: 18px;
            width: 34px;
        }
        .char-iris .mouth {
            width: 20px;
        }

        .char-zara .bot-avatar {
            border-radius: 26px 26px 34px 34px;
        }
        .char-zara .face {
            inset: 17px 24px 20px;
            border-radius: 30px 30px 28px 28px;
        }
        .char-zara .bot-avatar::after {
            width: 86px;
            height: 24px;
            top: 9px;
            border-radius: 38px 24px 12px 12px;
            transform: translateX(-50%) skewX(-6deg);
            box-shadow: 10px 8px 0 0 var(--hair), -6px 16px 0 -6px var(--hair);
        }
        .char-zara .eye {
            width: 13px;
            height: 10px;
            border-radius: 10px;
        }
        .char-zara .iris {
            background: #2f2f7a;
        }
        .char-zara .hoodie {
            width: 86px;
            height: 58px;
            border-radius: 20px 20px 10px 10px;
        }

        .char-onyx .bot-avatar {
            border-radius: 24px 24px 30px 30px;
        }
        .char-onyx .face {
            inset: 16px 22px 20px;
            border-radius: 26px 26px 30px 30px;
        }
        .char-onyx .bot-avatar::after {
            width: 70px;
            height: 18px;
            top: 14px;
            border-radius: 26px 26px 10px 10px;
            box-shadow: 0 4px 0 2px var(--hair), 0 10px 0 3px var(--hair);
        }
        .char-onyx .hoodie {
            width: 92px;
            height: 54px;
            border-radius: 26px 26px 8px 8px;
        }
        .char-onyx .mustache {
            width: 36px;
        }
        .char-onyx .eye,
        .char-onyx .iris {
            top: 48px;
        }
        @media (max-width: 860px) {
            .bot-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        @media (max-width: 520px) {
            .bot-grid {
                grid-template-columns: 1fr;
            }
            #chessboard {
                grid-template-columns: repeat(8, 42px);
                grid-template-rows: repeat(8, 42px);
            }
            .cell {
                width: 42px;
                height: 42px;
            }
            .piece {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <h1>1 Player Chess Game</h1>
    <div id="menu-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;">
        <div class="menu-panel">
            <h2>Select Bot Difficulty</h2>
            <p class="menu-subtitle">Choose which AI challenger you want to play.</p>
            <div class="bot-grid">
                <button class="bot-btn bot-easy tone-light char-milo" data-diff="easy">
                    <span class="bot-label">Easy</span>
                    <span class="bot-avatar">
                        <span class="hoodie"></span>
                        <span class="neck"></span>
                        <span class="ear left"></span>

                        <span class="eye right"></span>

                        <span class="cheek left"></span>
                        <span class="cheek right"></span>
                        <span class="mouth"></span>
                        <span class="glasses"></span>
                        <span class="glasses-bridge"></span>
                    </span>
                    <span class="bot-name">Milo Spark</span>
                    <span class="bot-note">Casual learner bot</span>
                </button>
                <button class="bot-btn bot-easy tone-warm char-poppy" data-diff="easy">

                        <span class="iris right"></span>
                        <span class="nose"></span>
                        <span class="cheek left"></span>
                        <span class="cheek right"></span>
                        <span class="mouth"></span>
                        <span class="bow"></span>
                        <span class="earring"></span>
                    </span>
                    <span class="bot-name">Poppy Flux</span>
                    <span class="bot-note">Friendly opener bot</span>
                </button>
                <button class="bot-btn bot-medium tone-olive char-nova" data-diff="medium">
                    <span class="bot-label">Medium</span>
                    <span class="bot-avatar">
                        <span class="hoodie"></span>
                        <span class="neck"></span>
                        <span class="ear left"></span>

                        <span class="mouth"></span>
                        <span class="mustache"></span>
                        <span class="chain"></span>
                    </span>
                    <span class="bot-name">Nova Byte</span>
                    <span class="bot-note">Balanced tactical bot</span>
                </button>
                <button class="bot-btn bot-medium tone-deep char-kira" data-diff="medium">
                    <span class="bot-label">Medium</span>
                    <span class="bot-avatar">
                        <span class="hoodie"></span>
                        <span class="neck"></span>
                        <span class="ear left"></span>
                        <span class="ear right"></span>
                        <span class="face"></span>

                        <span class="cap"></span>
                        <span class="headset"></span>
                    </span>
                    <span class="bot-name">Kira Vector</span>
                    <span class="bot-note">Steady counterplay bot</span>
                </button>
                <button class="bot-btn bot-hard tone-warm char-rex" data-diff="hard">
                    <span class="bot-label">Hard</span>
                    <span class="bot-avatar">
                        <span class="hoodie"></span>
                        <span class="neck"></span>
                        <span class="ear left"></span>
                        <span class="ear right"></span>
                        <span class="face"></span>
                        <span class="jaw-shadow"></span>

                        <span class="cheek left"></span>
                        <span class="cheek right"></span>
                        <span class="mouth"></span>
                        <span class="beard"></span>
                        <span class="scar"></span>
                    </span>
                    <span class="bot-name">Rex Meridian</span>
                    <span class="bot-note">Sharp attacking bot</span>
                </button>
                <button class="bot-btn bot-hard tone-light char-iris" data-diff="hard">
                    <span class="bot-label">Hard</span>
                    <span class="bot-avatar">
                        <span class="hoodie"></span>
                        <span class="neck"></span>

                        <span class="cheek left"></span>

                        <span class="monocle"></span>
                        <span class="goatee"></span>

                    </span>
                    <span class="bot-name">Iris Quill</span>
                    <span class="bot-note">Methodical pressure bot</span>
                </button>
                <button class="bot-btn bot-impossible tone-olive char-zara" data-diff="impossible">
                    <span class="bot-label">Impossible</span>
                    <span class="bot-avatar">
                        <span class="hoodie"></span>
                        <span class="neck"></span>
                        <span class="ear left"></span>

                        <span class="brow right"></span>
                        <span class="eye left"></span>

                        <span class="iris right"></span>
                        <span class="nose"></span>
                        <span class="cheek left"></span>

                        <span class="mouth"></span>
                        <span class="glasses"></span>

                    </span>
                    <span class="bot-name">Zara Hex</span>

                </button>
                <button class="bot-btn bot-impossible tone-deep char-onyx" data-diff="impossible">
                    <span class="bot-label">Impossible</span>
                    <span class="bot-avatar">
                        <span class="hoodie"></span>
                        <span class="neck"></span>

                        <span class="cheek left"></span>

                        <span class="cap"></span>
                        <span class="mustache"></span>
                        <span class="headset"></span>
                    </span>
                    <span class="bot-name">Onyx Vale</span>
                    <span class="bot-note">Cold calculation bot</span>
                </button>
            </div>
        </div>
    </div>
    <div id="status">Your move (White)</div>
    <div id="gameover-title" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:20;align-items:center;justify-content:center;flex-direction:column;font-size:64px;color:#fff;font-weight:bold;text-shadow:2px 2px 8px #000;">
        <span id="gameover-heading">Game Over</span>
        <div id="gameover-msg" style="font-size:32px;margin-top:20px;"></div>
        <button id="restart-btn" style="margin-top:40px;font-size:28px;padding:12px 36px;border-radius:8px;border:none;background:#2196f3;color:#fff;cursor:pointer;box-shadow:0 2px 8px #0003;">Restart</button>
    </div>
    <div id="chessboard"></div>
    <script src="script.js"></script>
</body>
</html>
